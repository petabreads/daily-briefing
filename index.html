<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Briefing">
<title>Daily Briefing</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f5f5f7; --surface: #fff; --surface2: #f5f5f7;
  --border: rgba(0,0,0,0.08); --border-md: rgba(0,0,0,0.12);
  --text: #1d1d1f; --text-2: #6e6e73; --text-3: #a1a1a6;
  --accent: #0071e3; --rc: #ff3b30; --rw: #ff9500; --ri: #0071e3;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000; --surface: #1c1c1e; --surface2: #2c2c2e;
    --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.14);
    --text: #f5f5f7; --text-2: #98989d; --text-3: #636366;
    --accent: #2997ff; --rc: #ff453a; --rw: #ff9f0a; --ri: #2997ff;
  }
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif; min-height:100dvh; padding-top:var(--safe-top); padding-bottom:calc(var(--safe-bottom) + 20px); -webkit-font-smoothing:antialiased; }
.header { padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:rgba(245,245,247,0.85); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); z-index:10; border-bottom:0.5px solid var(--border); }
@media (prefers-color-scheme:dark) { .header { background:rgba(0,0,0,0.85); } }
.header-sub { font-size:12px; color:var(--text-2); margin-top:1px; }
.header-actions { display:flex; gap:8px; }
.icon-btn { width:32px; height:32px; border-radius:50%; background:var(--surface); border:0.5px solid var(--border-md); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-2); transition:opacity 0.15s; }
.icon-btn:active { opacity:0.5; }
.icon-btn svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.icon-btn.spinning { animation:spin 0.9s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.summary-wrap { padding:12px 16px 0; display:none; }
.summary-wrap.visible { display:block; }
.summary-card { background:var(--surface); border-radius:14px; border:0.5px solid var(--border); padding:14px 16px; }
.summary-eyebrow { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--accent); margin-bottom:5px; }
.summary-text { font-size:14px; line-height:1.55; color:var(--text); }
.summary-time { font-size:11px; color:var(--text-3); margin-top:6px; }
.pills-wrap { padding:12px 16px 4px; display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
.pills-wrap::-webkit-scrollbar { display:none; }
.pill { padding:5px 13px; border-radius:20px; font-size:13px; font-weight:500; border:0.5px solid var(--border-md); background:var(--surface); color:var(--text-2); white-space:nowrap; cursor:pointer; transition:all 0.15s; }
.pill.active { background:var(--text); color:var(--bg); border-color:transparent; }
.list-wrap { padding:10px 16px; }
.list-label { font-size:12px; color:var(--text-3); margin:12px 0 8px 2px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.alert { background:var(--surface); border-radius:14px; border:0.5px solid var(--border); margin-bottom:8px; overflow:hidden; display:flex; }
.alert-accent { width:3px; flex-shrink:0; }
.alert-body { padding:13px 14px; flex:1; min-width:0; }
.alert-top { display:flex; align-items:flex-start; gap:8px; }
.alert-main { flex:1; min-width:0; }
.alert-meta-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
.alert-source { font-size:11px; font-weight:500; color:var(--text-3); text-transform:uppercase; letter-spacing:0.3px; }
.alert-badge { font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:0.3px; }
.badge-critical { background:rgba(255,59,48,0.1); color:var(--rc); }
.badge-warning { background:rgba(255,149,0,0.1); color:var(--rw); }
.badge-info { background:rgba(0,113,227,0.1); color:var(--ri); }
@media (prefers-color-scheme:dark) {
  .badge-critical { background:rgba(255,69,58,0.15); }
  .badge-warning { background:rgba(255,159,10,0.15); }
  .badge-info { background:rgba(41,151,255,0.15); }
}
.alert-title { font-size:15px; font-weight:500; line-height:1.3; color:var(--text); }
.alert-desc { font-size:13px; color:var(--text-2); margin-top:4px; line-height:1.45; }
.alert-footer { display:flex; align-items:center; gap:8px; margin-top:7px; flex-wrap:wrap; }
.alert-time { font-size:12px; color:var(--text-3); }
.alert-tag { font-size:11px; padding:2px 8px; border-radius:5px; background:var(--surface2); color:var(--text-2); }
.score-row { display:flex; align-items:center; gap:6px; margin-top:6px; }
.score-bar-bg { flex:1; height:3px; border-radius:2px; background:var(--surface2); overflow:hidden; }
.score-bar-fill { height:100%; border-radius:2px; }
.score-num { font-size:11px; font-weight:600; min-width:22px; text-align:right; }
.dismiss-btn { width:22px; height:22px; border-radius:50%; background:var(--surface2); border:none; color:var(--text-3); font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; margin-top:2px; }
.dismiss-btn:active { opacity:0.5; }
.stale-banner { margin:10px 16px 0; padding:10px 14px; background:rgba(255,149,0,0.08); border:0.5px solid rgba(255,149,0,0.25); border-radius:12px; font-size:13px; color:var(--rw); display:none; }
.stale-banner.visible { display:block; }
.center-wrap { padding:64px 24px; text-align:center; }
.center-icon { font-size:32px; margin-bottom:14px; }
.center-icon.pulse { animation:px 1.6s ease-in-out infinite; }
@keyframes px { 0%,100%{opacity:1} 50%{opacity:.3} }
.center-title { font-size:17px; font-weight:500; margin-bottom:6px; }
.center-sub { font-size:14px; color:var(--text-2); line-height:1.5; }
.last-refresh { text-align:center; font-size:12px; color:var(--text-3); padding:8px 0 4px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div style="font-size:17px;font-weight:600;letter-spacing:-0.2px">Daily Briefing</div>
    <div class="header-sub" id="dateStr"></div>
  </div>
  <div class="header-actions">
    <div class="icon-btn" id="refreshBtn" onclick="loadBriefing()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </div>
  </div>
</div>
<div class="stale-banner" id="staleBanner"></div>
<div class="summary-wrap" id="summaryWrap">
  <div class="summary-card">
    <div class="summary-eyebrow">Today's overview</div>
    <div class="summary-text" id="summaryText"></div>
    <div class="summary-time" id="summaryTime"></div>
  </div>
</div>
<div class="pills-wrap" id="pillsWrap">
  <div class="pill active" data-filter="all" onclick="setFilter('all',this)">All</div>
</div>
<div class="list-wrap" id="mainContent">
  <div class="center-wrap">
    <div class="center-icon pulse">✦</div>
    <div class="center-title">Loading briefing…</div>
    <div class="center-sub">Fetching from GitHub</div>
  </div>
</div>
<div class="last-refresh" id="lastRefresh"></div>
<script>
const REPO="petabreads/daily-briefing", FILE="briefing.json";
let allAlerts=[], activeFilter="all";
document.getElementById("dateStr").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

async function loadBriefing(){
  const btn=document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  setContent(`<div class="center-wrap"><div class="center-icon pulse">✦</div><div class="center-title">Loading briefing…</div><div class="center-sub">Fetching from GitHub</div></div>`);
  document.getElementById("summaryWrap").classList.remove("visible");
  document.getElementById("staleBanner").classList.remove("visible");
  try{
    const res=await fetch(`https://raw.githubusercontent.com/${REPO}/main/${FILE}?t=${Date.now()}`);
    if(!res.ok) throw new Error("No briefing found — run your Cowork prompt first.");
    const data=await res.json();
    if(data.generated){
      const age=(Date.now()-new Date(data.generated).getTime())/36e5;
      if(age>18){
        const b=document.getElementById("staleBanner");
        b.textContent=`Briefing is ${Math.round(age)} hours old — run Cowork to refresh.`;
        b.classList.add("visible");
      }
    }
    allAlerts=data.alerts||[];
    renderBriefing(data);
  }catch(err){
    setContent(`<div class="center-wrap"><div class="center-icon">⚠</div><div class="center-title">No briefing yet</div><div class="center-sub">${err.message}</div></div>`);
  }
  btn.classList.remove("spinning");
  document.getElementById("lastRefresh").textContent="Checked "+new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

function renderBriefing(data){
  if(data.summary){
    document.getElementById("summaryText").textContent=data.summary;
    if(data.generated){
      const d=new Date(data.generated);
      document.getElementById("summaryTime").textContent="Generated "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})+" · "+d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    }
    document.getElementById("summaryWrap").classList.add("visible");
  }
  const sources=[...new Set(allAlerts.map(a=>a.source))];
  const bar=document.getElementById("pillsWrap");
  bar.innerHTML=`<div class="pill active" data-filter="all" onclick="setFilter('all',this)">All</div>`;
  sources.forEach(s=>{
    const p=document.createElement("div");
    p.className="pill"; p.dataset.filter=s; p.textContent=s;
    p.onclick=()=>setFilter(s,p); bar.appendChild(p);
  });
  renderAlerts(allAlerts);
}

function setFilter(val,el){
  activeFilter=val;
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  renderAlerts(allAlerts);
}

function lc(l){return l==="critical"?"var(--rc)":l==="warning"?"var(--rw)":"var(--ri)";}
function ll(l){return l==="critical"?"Critical":l==="warning"?"Attention":"Info";}

function renderAlerts(alerts){
  const filtered=activeFilter==="all"?alerts:alerts.filter(a=>a.source===activeFilter);
  const sorted=[...filtered].sort((a,b)=>(b.priority_score??50)-(a.priority_score??50));
  if(!sorted.length){
    setContent(`<div class="center-wrap"><div class="center-icon">✓</div><div class="center-title">All clear</div><div class="center-sub">Nothing needs attention right now.</div></div>`);
    return;
  }
  let html=`<div class="list-label">${sorted.length} item${sorted.length!==1?"s":""} · ranked by priority</div>`;
  sorted.forEach(a=>{
    const c=lc(a.level),sc=a.priority_score??50;
    html+=`<div class="alert">
      <div class="alert-accent" style="background:${c}"></div>
      <div class="alert-body">
        <div class="alert-top">
          <div class="alert-main">
            <div class="alert-meta-row">
              <span class="alert-source">${a.source}</span>
              <span class="alert-badge badge-${a.level}">${ll(a.level)}</span>
            </div>
            <div class="alert-title">${a.title}</div>
            ${a.body?`<div class="alert-desc">${a.body}</div>`:""}
            <div class="alert-footer">
              ${a.time?`<span class="alert-time">${a.time}</span>`:""}
              ${a.tag?`<span class="alert-tag">${a.tag}</span>`:""}
            </div>
            <div class="score-row">
              <div class="score-bar-bg"><div class="score-bar-fill" style="width:${sc}%;background:${c}"></div></div>
              <span class="score-num" style="color:${c}">${sc}</span>
            </div>
          </div>
          <button class="dismiss-btn" onclick="this.closest('.alert').style.display='none'">✕</button>
        </div>
      </div>
    </div>`;
  });
  setContent(html);
}

function setContent(h){document.getElementById("mainContent").innerHTML=h;}
loadBriefing();
</script>
</body>
</html>
